name: C/C++ CI

on: [push]

jobs:
  build-ubuntu:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
    steps:
    - uses: actions/checkout@v1
    - name: package install
      run: |
        sudo apt-get update 
        sudo apt-get -y install xorg-dev libglu1-mesa-dev freeglut3-dev mesa-common-dev
    - name: configure
      env:
        CC: ${{ matrix.compiler }}
      run: |
        mkdir build
        cd build
        cmake -DBUILD_PENUMBRA_TESTING="$TESTING" -DPENUMBRA_STATIC_LIB="$STATIC_LIB" -DPENUMBRA_COVERAGE="$COVERAGE" -DCMAKE_BUILD_TYPE="$CONFIG" ..
    - name: build
      run: cmake --build build
    - name: test
      run: |
        cd build
        ctest

  build-windows:

    runs-on: windows-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
    steps:
    - uses: actions/checkout@v1
    - name: package install
      run: |
        git clone --recurse-submodules git@github.com:LunarG/VulkanTools.git
        cd VulkanTools
        ./update_external_sources.bat
    - name: configure
      env:
        CC: ${{ matrix.compiler }}
      run: |
        mkdir build
        cd build
        cmake -DBUILD_PENUMBRA_TESTING="$TESTING" -DPENUMBRA_STATIC_LIB="$STATIC_LIB" -DPENUMBRA_COVERAGE="$COVERAGE" -DCMAKE_BUILD_TYPE="$CONFIG" ..
    - name: build
      run: cmake --build build
    - name: test
      run: |
        cd build
        ctest
