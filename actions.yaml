name: C/C++ CI

on: [push]

strategy:
  matrix:
    compiler: [gcc, clang]

jobs:
  build-ubuntu:

    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v1
    - name: preinstall
      run: sudo apt-get -y install xorg-dev libglu1-mesa-dev freeglut3-dev mesa-common-dev;   
    - name: configure
      env:
        CC: ${{ matrix.compiler }}
      run: mkdir build && cd build && cmake -DBUILD_PENUMBRA_TESTING="$TESTING" -DPENUMBRA_STATIC_LIB="$STATIC_LIB" -DPENUMBRA_COVERAGE="$COVERAGE" -DCMAKE_BUILD_TYPE="$CONFIG" ..
    - name: build
      run: cmake --build build
    - name: test
      run: cd build && ctest

  build-windows:

    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v1
    - name: configure
      env:
        CC: ${{ matrix.compiler }}
      run: mkdir build && cd build && cmake -DBUILD_PENUMBRA_TESTING="$TESTING" -DPENUMBRA_STATIC_LIB="$STATIC_LIB" -DPENUMBRA_COVERAGE="$COVERAGE" -DCMAKE_BUILD_TYPE="$CONFIG" ..
    - name: build
      run: cmake --build build
    - name: test
      run: cd build && ctest